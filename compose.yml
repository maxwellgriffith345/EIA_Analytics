services:
  db:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eia_postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: eiadb
    ports:
      - "5432:5432"
    volumes:
      - eia_data_sql:/var/lib/postgresql   # Persistent data storage

volumes:
  eia_data_sql:
